name: calcool
description: A local-first BAC calculation app with Neumorphic UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: 
  riverpod_annotation: 
  hive: 
  hive_flutter: 
  intl: 
  path_provider: 
  share_plus: ^13.2.0
  file_picker: ^3.0.4
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: 
  riverpod_generator: 
  hive_generator: 

flutter:
  uses-material-design: true
  assets:
    - assets/logo_CAlcool.png
    - assets/drinks_presets.json
